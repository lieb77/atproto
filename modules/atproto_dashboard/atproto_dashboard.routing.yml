atproto_dashboard.dashboard:
  path: '/atproto/dashboard'
  defaults:
    _controller: '\Drupal\atproto_dashboard\Controller\AtprotoDashboardController::dashboardShell'
    _title: 'ATproto Dashboard'
  requirements:
    _permission: 'administer atproto'

atproto_dashboard.ride_view:
  path: '/atproto/dashboard/ride-view'
  defaults:
    _controller: '\Drupal\atproto_dashboard\Controller\AtprotoDashboardController::rideView'
  requirements:
    _permission: 'administer atproto'

atproto_dashboard.doc_view:
  path: '/atproto/dashboard/doc-view'
  defaults:
    _controller: '\Drupal\atproto_dashboard\Controller\AtprotoDashboardController::docView'
  requirements:
    _permission: 'administer atproto'

atproto_dashboard.post_view:
  path: '/atproto/dashboard/post-view'
  defaults:
    _controller: '\Drupal\atproto_dashboard\Controller\AtprotoDashboardController::postView'
  requirements:
    _permission: 'administer atproto'
      
atproto_dashboard.view:
  path: '/atproto/dashboard/view/{type}/{rkey}'
  defaults:
    _controller: '\Drupal\atproto_dashboard\Controller\AtprotoDashboardController::viewRecord'
  requirements:
    _permission: 'administer atproto'
    
atproto_dashboard.render:
  path: '/atproto/dashboard/render/{type}/{rkey}'
  defaults:
    _controller: '\Drupal\atproto_dashboard\Controller\AtprotoDashboardController::renderRecord'
  requirements:
    _permission: 'administer atproto'
          
atproto_dashboard.update:
  path: '/atproto/dashboard/update/{rkey}'
  defaults:
    _controller: '\Drupal\atproto_dashboard\Controller\AtprotoDashboardController::update'
  requirements:
    _permission: 'administer atproto'

atproto_dashboard.delete:
  path: '/atproto/dashboard/delete/{rkey}'
  defaults:
    _controller: '\Drupal\atproto_dashboard\Controller\AtprotoDashboardController::delete'
  requirements:
    _permission: 'administer atproto'
  methods: [DELETE]
  

  